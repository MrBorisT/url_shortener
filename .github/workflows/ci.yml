name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: url_shortener_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d url_shortener_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_URL: postgres://postgres:postgres@localhost:5432/url_shortener_test?sslmode=disable
      JWT_SECRET: test-secret
      JWT_TTL: 1h
      APP_PORT: 8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install migrate
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations
        run: |
          migrate -path ./migrations -database "$DB_URL" up

      - name: Run tests
        run: |
            go test ./...
            go test -tags=integration ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11